name: CI Workflow  # Name of the workflow

on:
  push:
  pull_request:

permissions:
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest  # Use the latest Ubuntu runner
    defaults:
      run:
        working-directory: ci_lab  # Set the default working directory for all steps

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"  # Ensure consistency in Python version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests with Pytest
        id: runTest
        run: pytest --cov=src --cov-report=term-missing

      - name: Install Flake8
        run: pip install flake8

      - name: Run Flake8 Linting
        run: flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test Results
        id: testRes
        run:  |
          if ["{{ steps.runTest.outcome}}" == "success"]; then
            echo "pass" >> $GITHUB_OUTPUT
          else 
            echo "fail" >> $GITHUB_OUTPUT 
          fi

      - name: Comment on Pr
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.testRes.outputs.result }}
